name: CI

on:
  pull_request:
  push:
    branches:
      - dev-rollout-freeze
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Guard - Supabase first architecture
        run: npm run verify:architecture:supabase-first

      - name: Guard - Gemini client security
        run: npm run verify:security:gemini-client

      - name: Guard - Auth Supabase stage01
        run: npm run verify:auth:supabase-stage01

      - name: Guard - Quiet release gate
        run: npm run verify:closeflow:quiet

      - name: Guard - Mojibake
        run: npm run check:polish-mojibake

      - name: Guard - Supabase migrations
        run: npm run verify:migrations:supabase
